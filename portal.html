<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS V12 | Elite Showroom</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Outfit:wght@200;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #e31010; 
            --dark: #050505; 
            --card-bg: #0d0d0d;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Outfit', sans-serif; background: var(--dark); color: #fff; overflow-x: hidden; }

        /* HEADER */
        header { 
            background: rgba(0,0,0,0.95); padding: 15px 5%; 
            position: fixed; top: 0; width: 100%; z-index: 2000;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }
        #logo-place h1 { font-family: 'Syncopate', sans-serif; font-size: 16px; letter-spacing: 5px; }
        .logo-img { max-height: 40px; }
        
        .header-nav { display: flex; gap: 20px; }
        .header-nav a { color: #fff; text-decoration: none; font-size: 11px; font-weight: 700; letter-spacing: 1px; opacity: 0.7; transition: 0.3s; }
        .header-nav a:hover { opacity: 1; color: var(--primary); }

        /* HERO SECTION - IMPACTO VISUAL */
        .hero { 
            height: 90vh; width: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), var(--dark)), 
                        url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 0 20px;
        }
        .hero h2 { font-family: 'Syncopate', sans-serif; font-size: clamp(22px, 6vw, 55px); margin-bottom: 15px; letter-spacing: -1px; text-transform: uppercase; }
        .hero p { font-size: 18px; font-weight: 200; color: #aaa; max-width: 700px; margin-bottom: 35px; letter-spacing: 1px; }
        .btn-scroll { 
            padding: 18px 45px; background: var(--primary); color: #fff; 
            text-decoration: none; border-radius: 4px; font-weight: 900; 
            font-size: 12px; letter-spacing: 3px; transition: 0.4s;
            border: 1px solid transparent;
        }
        .btn-scroll:hover { background: transparent; border-color: var(--primary); transform: scale(1.05); }

        /* BUSCA E FILTROS */
        .search-section { background: var(--dark); padding-top: 50px; }
        .search-container { max-width: 600px; margin: 0 auto; padding: 0 20px; }
        .search-box { 
            display: flex; align-items: center; background: #111; 
            border: 1px solid #222; padding: 5px 20px; border-radius: 8px; transition: 0.3s;
        }
        .search-box:focus-within { border-color: var(--primary); box-shadow: 0 0 15px rgba(227, 16, 16, 0.2); }
        .search-box input { background: transparent; border: none; padding: 15px; color: #fff; width: 100%; outline: none; font-size: 14px; font-family: 'Outfit'; }
        .search-box i { color: var(--primary); }

        /* ESTOQUE */
        .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px 100px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 30px; }
        
        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid #1a1a1a; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; }
        .card:hover { transform: translateY(-12px); border-color: var(--primary); }

        .slider { position: relative; width: 100%; aspect-ratio: 16/10; overflow: hidden; background: #000; }
        .slider img { width: 100%; height: 100%; object-fit: cover; display: none; position: absolute; transition: 0.5s; }
        .slider img.active { display: block; animation: zoomIn 0.8s ease; }
        
        @keyframes zoomIn { from { transform: scale(1.1); opacity: 0.5; } to { transform: scale(1); opacity: 1; } }

        .nav-btn { 
            position: absolute; top: 50%; transform: translateY(-50%); 
            background: rgba(0,0,0,0.6); color: #fff; border: none; width: 40px; height: 40px; 
            border-radius: 50%; cursor: pointer; z-index: 10; font-size: 10px; opacity: 0; transition: 0.3s;
        }
        .card:hover .nav-btn { opacity: 1; }
        .nav-btn:hover { background: var(--primary); }
        .prev { left: 10px; } .next { right: 10px; }

        .card-body { padding: 25px; }
        .car-brand { font-size: 10px; color: var(--primary); font-weight: 800; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .car-title { font-family: 'Syncopate', sans-serif; font-size: 15px; margin-bottom: 20px; color: #fff; }
        
        .specs { display: flex; gap: 20px; margin-bottom: 20px; border-top: 1px solid #1a1a1a; padding-top: 15px; }
        .spec-item { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1px; }
        .spec-item b { color: #ddd; display: block; font-size: 13px; margin-top: 3px; font-weight: 400; }

        .price-row { display: flex; justify-content: space-between; align-items: center; padding-top: 10px; }
        .price { font-size: 24px; font-weight: 200; color: #fff; }
        .btn-whats { 
            background: #25D366; color: #fff; width: 45px; height: 45px; 
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            text-decoration: none; transition: 0.3s; font-size: 20px;
        }
        .btn-whats:hover { background: var(--primary); transform: rotate(-10deg) scale(1.1); }

        /* MOBILE */
        @media (max-width: 768px) {
            .header-nav { display: none; }
            .hero h2 { font-size: 28px; }
            .hero p { font-size: 14px; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div id="logo-place"><h1>NEXUS V12</h1></div>
        <nav class="header-nav">
            <a href="#estoque">ESTOQUE</a>
            <a href="#">FINANCIAMENTO</a>
            <a href="#">CONTATO</a>
        </nav>
    </header>

    <section class="hero">
        <h2>Transparência em cada detalhe</h2>
        <p>A maior vitrine de novos e seminovos selecionados com padrão de excelência.</p>
        <a href="#estoque" class="btn-scroll">EXPLORAR ESTOQUE</a>
    </section>

    <div class="search-section" id="estoque">
        <div class="search-container">
            <div class="search-box">
                <i class="fa fa-search"></i>
                <input type="text" id="busca" placeholder="Pesquisar por modelo, marca ou ano..." oninput="window.filtrar()">
            </div>
        </div>
    </div>

    <div class="container">
        <div id="lista-carros" class="grid">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBOCli1HzoijZ1gcplo_18tKH-5Umb63q8",
            authDomain: "nexus-v12.firebaseapp.com",
            projectId: "nexus-v12",
            storageBucket: "nexus-v12.firebasestorage.app",
            messagingSenderId: "587840382224",
            appId: "1:587840382224:web:61c0f1890c7c395dc77195"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const params = new URLSearchParams(window.location.search);
        const lojaId = params.get('loja');
        let todosCarros = [];

        if(lojaId) {
            onSnapshot(doc(db, "configuracoes", lojaId), (s) => {
                if(s.exists()){
                    const d = s.data();
                    if(d.corLoja) document.documentElement.style.setProperty('--primary', d.corLoja);
                    if(d.logo) document.getElementById('logo-place').innerHTML = `<img src="${d.logo}" class="logo-img">`;
                }
            });

            const q = query(collection(db, "carros"), where("lojaId", "==", lojaId), where("status", "==", "disponivel"));
            onSnapshot(q, (snap) => {
                todosCarros = [];
                snap.forEach(d => todosCarros.push({id: d.id, ...d.data()}));
                renderizar(todosCarros);
            });
        }

        function renderizar(lista) {
            const grid = document.getElementById('lista-carros');
            grid.innerHTML = '';
            
            lista.forEach((c, carIdx) => {
                const fotosHtml = (c.fotos || []).map((f, i) => `<img src="${f}" class="${i===0?'active':''}">`).join('');
                
                grid.innerHTML += `
                    <div class="card">
                        <div class="slider" id="slider-${carIdx}">
                            <button class="nav-btn prev" onclick="window.changeSlide(${carIdx}, -1)"><i class="fa fa-chevron-left"></i></button>
                            <button class="nav-btn next" onclick="window.changeSlide(${carIdx}, 1)"><i class="fa fa-chevron-right"></i></button>
                            ${fotosHtml}
                        </div>
                        <div class="card-body">
                            <span class="car-brand">${c.marca || 'Premium'}</span>
                            <div class="car-title">${c.modelo}</div>
                            
                            <div class="specs">
                                <div class="spec-item">Ano <b>${c.ano}</b></div>
                                <div class="spec-item">Km <b>${Number(c.km).toLocaleString('pt-BR')}</b></div>
                            </div>

                            <div class="price-row">
                                <div class="price">R$ ${Number(c.preco).toLocaleString('pt-BR')}</div>
                                <a href="#" class="btn-whats" onclick="window.negociar('${c.modelo}', '${c.vendedorResponsavel}')">
                                    <i class="fab fa-whatsapp"></i>
                                </a>
                            </div>
                        </div>
                    </div>`;
            });
        }

        window.changeSlide = (carIdx, dir) => {
            const slider = document.getElementById(`slider-${carIdx}`);
            const imgs = slider.querySelectorAll('img');
            if(imgs.length <= 1) return;
            let activeIdx = Array.from(imgs).findIndex(img => img.classList.contains('active'));
            imgs[activeIdx].classList.remove('active');
            activeIdx = (activeIdx + dir + imgs.length) % imgs.length;
            imgs[activeIdx].classList.add('active');
        };

        window.negociar = async (modelo, vendedor) => {
            const q = query(collection(db, "vendedores"), where("lojaId", "==", lojaId), where("nome", "==", vendedor));
            const snap = await getDocs(q);
            let tel = "";
            snap.forEach(d => tel = d.data().whatsapp);
            if(tel) {
                const num = tel.replace(/\D/g, "");
                window.open(`https://wa.me/55${num}?text=Olá! Vi o anúncio do ${modelo} no portal e gostaria de mais informações.`, '_blank');
            }
        };

        window.filtrar = () => {
            const termo = document.getElementById('busca').value.toLowerCase();
            const filtrados = todosCarros.filter(c => 
                c.modelo.toLowerCase().includes(termo) || 
                c.marca.toLowerCase().includes(termo) ||
                c.ano.toString().includes(termo)
            );
            renderizar(filtrados);
        };
    </script>
</body>
</html>
