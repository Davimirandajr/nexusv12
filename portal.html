<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS V12 | Excellence Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Outfit:wght@100;300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #e31010; 
            --dark: #050505; 
            --card-bg: rgba(20, 20, 20, 0.6);
            --glass: rgba(255, 255, 255, 0.03);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--dark); 
            background-image: radial-gradient(circle at 50% -20%, #1a1a1a 0%, #050505 80%);
            color: #fff; 
            overflow-x: hidden; 
        }

        /* HEADER FLUTUANTE */
        header { 
            background: rgba(0,0,0,0.8); padding: 20px 5%; 
            position: sticky; top: 0; z-index: 2000;
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        #logo-place h1 { font-family: 'Syncopate', sans-serif; font-size: 18px; letter-spacing: 8px; color: #fff; }
        .logo-img { max-height: 40px; }

        /* LAYOUT COLUNAS */
        .main-container { display: flex; max-width: 1600px; margin: 0 auto; gap: 30px; padding: 40px 20px; }

        /* FILTROS LATERAIS (ESTILO UNIDAS) */
        .sidebar { 
            width: 300px; position: sticky; top: 120px; height: fit-content;
            background: var(--glass); padding: 30px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px);
        }
        .sidebar h3 { font-family: 'Syncopate', sans-serif; font-size: 10px; margin-bottom: 25px; color: var(--primary); letter-spacing: 3px; }
        .filter-group { margin-bottom: 20px; }
        .filter-group label { display: block; font-size: 10px; color: #555; text-transform: uppercase; margin-bottom: 8px; font-weight: 600; }
        .filter-group input { 
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); 
            padding: 12px; color: #fff; border-radius: 8px; outline: none; transition: 0.3s;
        }
        .filter-group input:focus { border-color: var(--primary); background: rgba(0,0,0,0.5); }

        /* GRID DE CARROS */
        .content { flex: 1; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }

        /* CARDS ULTRA MODERNOS */
        .card { 
            background: var(--card-bg); border-radius: 24px; overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.05); transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            backdrop-filter: blur(5px);
        }
        .card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }

        /* SLIDER COM NAVEGAÇÃO INTERNA */
        .slider { position: relative; width: 100%; aspect-ratio: 16/10; background: #000; overflow: hidden; }
        .slider img { width: 100%; height: 100%; object-fit: cover; position: absolute; opacity: 0; transition: 0.8s ease; transform: scale(1.1); }
        .slider img.active { opacity: 1; transform: scale(1); }

        .nav-btn { 
            position: absolute; top: 50%; transform: translateY(-50%); 
            background: rgba(0,0,0,0.4); color: #fff; border: none; 
            width: 35px; height: 35px; border-radius: 50%; cursor: pointer; z-index: 10;
            display: flex; align-items: center; justify-content: center; font-size: 12px;
            transition: 0.3s; opacity: 0;
        }
        .card:hover .nav-btn { opacity: 1; }
        .nav-btn:hover { background: var(--primary); }
        .btn-prev { left: 15px; } .btn-next { right: 15px; }

        /* CONTEÚDO DO CARD */
        .card-body { padding: 25px; }
        .brand-label { font-size: 10px; color: var(--primary); font-weight: 800; letter-spacing: 4px; text-transform: uppercase; }
        .model-name { font-family: 'Syncopate', sans-serif; font-size: 16px; margin: 8px 0 20px; font-weight: 700; }
        
        .specs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .spec-item { font-size: 11px; color: #666; }
        .spec-item span { display: block; color: #ddd; font-size: 14px; font-weight: 300; margin-top: 4px; }

        .price-container { border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px; display: flex; justify-content: space-between; align-items: center; }
        .price-val { font-size: 24px; font-weight: 200; letter-spacing: -1px; }

        .btn-action { 
            background: #fff; color: #000; padding: 12px 20px; border-radius: 12px;
            text-decoration: none; font-size: 11px; font-weight: 900; letter-spacing: 1px;
            text-transform: uppercase; transition: 0.3s;
        }
        .btn-action:hover { background: var(--primary); color: #fff; }

        /* RESPONSIVIDADE */
        @media (max-width: 1000px) {
            .main-container { flex-direction: column; }
            .sidebar { width: 100%; position: relative; top: 0; }
        }
    </style>
</head>
<body>

    <header>
        <div id="logo-place"><h1>NEXUS V12</h1></div>
        <div style="font-size: 10px; color: #555; letter-spacing: 2px;">SINCE 2026</div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <h3>Filtros de Busca</h3>
            <div class="filter-group">
                <label>Pesquisar</label>
                <input type="text" id="busca" placeholder="Modelo ou marca..." oninput="window.filtrar()">
            </div>
            <div style="margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px;">
                <p style="font-size: 9px; color: #444; line-height: 1.5;">O NEXUS V12 sincroniza seu estoque em tempo real usando tecnologia militar de dados.</p>
            </div>
        </aside>

        <main class="content">
            <div id="lista-carros" class="grid"></div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Configuração mantida do seu projeto
        const firebaseConfig = {
            apiKey: "AIzaSyBOCli1HzoijZ1gcplo_18tKH-5Umb63q8",
            authDomain: "nexus-v12.firebaseapp.com",
            projectId: "nexus-v12",
            storageBucket: "nexus-v12.firebasestorage.app",
            messagingSenderId: "587840382224",
            appId: "1:587840382224:web:61c0f1890c7c395dc77195"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const params = new URLSearchParams(window.location.search);
        const lojaId = params.get('loja');
        let todosCarros = [];

        if(lojaId) {
            // Sincronização de Marca e Cor
            onSnapshot(doc(db, "configuracoes", lojaId), (s) => {
                if(s.exists()){
                    const d = s.data();
                    if(d.corLoja) document.documentElement.style.setProperty('--primary', d.corLoja);
                    if(d.logo) document.getElementById('logo-place').innerHTML = `<img src="${d.logo}" class="logo-img">`;
                }
            });

            // Sincronização de Estoque
            const q = query(collection(db, "carros"), where("lojaId", "==", lojaId), where("status", "==", "disponivel"));
            onSnapshot(q, (snap) => {
                todosCarros = [];
                snap.forEach(d => todosCarros.push({id: d.id, ...d.data()}));
                renderizar(todosCarros);
            });
        }

        function renderizar(lista) {
            const grid = document.getElementById('lista-carros');
            grid.innerHTML = '';
            
            lista.forEach((c, carIdx) => {
                const fotosHtml = c.fotos.map((f, i) => `<img src="${f}" class="${i===0?'active':''}">`).join('');
                
                grid.innerHTML += `
                    <div class="card">
                        <div class="slider" id="slider-${carIdx}">
                            <button class="nav-btn btn-prev" onclick="window.changeSlide(${carIdx}, -1)"><i class="fa fa-chevron-left"></i></button>
                            <button class="nav-btn btn-next" onclick="window.changeSlide(${carIdx}, 1)"><i class="fa fa-chevron-right"></i></button>
                            ${fotosHtml}
                        </div>
                        <div class="card-body">
                            <span class="brand-label">${c.marca || 'Elite Selection'}</span>
                            <div class="model-name">${c.modelo}</div>
                            
                            <div class="specs-grid">
                                <div class="spec-item">Ano<span>${c.ano}</span></div>
                                <div class="spec-item">Quilometragem<span>${Number(c.km).toLocaleString('pt-BR')} km</span></div>
                            </div>

                            <div class="price-container">
                                <div class="price-val">R$ ${Number(c.preco).toLocaleString('pt-BR')}</div>
                                <a href="#" class="btn-action" onclick="window.negociar('${c.modelo}', '${c.vendedorResponsavel}')">RESERVAR</a>
                            </div>
                        </div>
                    </div>`;
            });
        }

        window.changeSlide = (carIdx, dir) => {
            const slider = document.getElementById(`slider-${carIdx}`);
            const imgs = slider.querySelectorAll('img');
            let activeIdx = Array.from(imgs).findIndex(img => img.classList.contains('active'));
            imgs[activeIdx].classList.remove('active');
            activeIdx = (activeIdx + dir + imgs.length) % imgs.length;
            imgs[activeIdx].classList.add('active');
        };

        window.negociar = async (modelo, vendedor) => {
            const q = query(collection(db, "vendedores"), where("lojaId", "==", lojaId), where("nome", "==", vendedor));
            const snap = await getDocs(q);
            let tel = "";
            snap.forEach(d => tel = d.data().whatsapp);
            if(tel) {
                const num = tel.replace(/\D/g, "");
                window.open(`https://wa.me/55${num}?text=Tenho interesse no veículo ${modelo}. Podemos conversar?`, '_blank');
            }
        };

        window.filtrar = () => {
            const termo = document.getElementById('busca').value.toLowerCase();
            const filtrados = todosCarros.filter(c => c.modelo.toLowerCase().includes(termo) || c.marca.toLowerCase().includes(termo));
            renderizar(filtrados);
        };
    </script>
</body>
</html>
