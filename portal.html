<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS V12 | Elite Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #e31010; 
            --dark: #050508; 
            --glass: rgba(255, 255, 255, 0.05);
            --whatsapp: #25D366;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--dark); color: #fff; }

        header { 
            background: rgba(5, 5, 8, 0.95); padding: 15px; 
            position: sticky; top: 0; z-index: 1000;
            backdrop-filter: blur(15px); border-bottom: 2px solid var(--primary);
        }
        .header-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: center; }
        .logo-img { max-height: 45px; }
        #logo-place h1 { font-family: 'Syncopate', sans-serif; font-size: 20px; color: var(--primary); letter-spacing: 2px; }

        .container { max-width: 1200px; margin: 0 auto; padding: 15px; }

        .search-box { position: relative; max-width: 500px; margin: 10px auto 30px; }
        .search-box input { 
            width: 100%; padding: 12px 15px 12px 45px; border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); background: var(--glass); 
            color: #fff; outline: none;
        }
        .search-box i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--primary); }

        /* GRID: 2 colunas no mobile, 3 ou 4 no PC */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
        }

        @media (min-width: 900px) {
            .grid { grid-template-columns: repeat(3, 1fr); gap: 25px; }
        }

        .card { 
            background: #111116; border-radius: 18px; overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column;
        }

        .slider { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; }
        .slider img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .slider img.active { display: block; }

        .card-content { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; }
        
        .car-brand { font-size: 9px; text-transform: uppercase; color: var(--primary); font-weight: 800; letter-spacing: 1px; }
        .car-title { font-size: 15px; font-weight: 700; margin: 2px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .price { font-size: 18px; font-weight: 800; color: #fff; margin: 5px 0; }

        /* Infos (Ano/KM) visíveis no mobile de forma discreta */
        .mini-specs { display: flex; gap: 8px; margin-bottom: 12px; font-size: 10px; color: #888; }
        .mini-specs span { background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; }

        .btn-whats { 
            background: var(--primary); color: #fff; text-decoration: none;
            padding: 10px; border-radius: 10px; font-weight: 700; text-align: center;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            font-size: 11px; transition: 0.3s; margin-top: auto;
        }

        .slider-btn { 
            position: absolute; top: 50%; transform: translateY(-50%); 
            background: rgba(0,0,0,0.5); color: #fff; border: none; 
            width: 28px; height: 28px; cursor: pointer; border-radius: 50%; z-index: 5;
            font-size: 10px;
        }
        .prev { left: 5px; } .next { right: 5px; }

        /* Modal Full Screen */
        #viewer-modal {
            display: none; position: fixed; inset: 0; background: #000; z-index: 5000;
            align-items: center; justify-content: center;
        }
        #viewer-modal img { max-width: 100%; max-height: 100%; object-fit: contain; }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <div id="logo-place"><h1>NEXUS V12</h1></div>
        </div>
    </header>

    <div class="container">
        <div class="search-box">
            <i class="fa fa-search"></i>
            <input type="text" id="busca" placeholder="Buscar veículo..." oninput="window.filtrar()">
        </div>
        <div id="lista-carros" class="grid"></div>
    </div>

    <div id="viewer-modal" onclick="this.style.display='none'">
        <img src="" id="full-img">
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBOCli1HzoijZ1gcplo_18tKH-5Umb63q8",
            authDomain: "nexus-v12.firebaseapp.com",
            projectId: "nexus-v12",
            storageBucket: "nexus-v12.firebasestorage.app",
            messagingSenderId: "587840382224",
            appId: "1:587840382224:web:61c0f1890c7c395dc77195"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const lojaId = params.get('loja');
        let todosCarros = [];

        if(lojaId) {
            onSnapshot(doc(db, "configuracoes", lojaId), (s) => {
                if(s.exists()){
                    const d = s.data();
                    if(d.corLoja) document.documentElement.style.setProperty('--primary', d.corLoja);
                    if(d.logo) document.getElementById('logo-place').innerHTML = `<img src="${d.logo}" class="logo-img">`;
                }
            });

            const q = query(collection(db, "carros"), where("lojaId", "==", lojaId), where("status", "==", "disponivel"));
            onSnapshot(q, (snap) => {
                todosCarros = [];
                snap.forEach(d => todosCarros.push({id: d.id, ...d.data()}));
                renderizar(todosCarros);
            });
        }

        function renderizar(lista) {
            const grid = document.getElementById('lista-carros');
            grid.innerHTML = '';
            
            lista.forEach((c, carIdx) => {
                const fotosHtml = c.fotos.map((f, i) => `<img src="${f}" class="${i===0?'active':''}" onclick="window.fullView('${f}')">`).join('');
                
                grid.innerHTML += `
                    <div class="card">
                        <div class="slider" id="slider-${carIdx}">
                            ${c.fotos.length > 1 ? `<button class="slider-btn prev" onclick="window.changeSlide(${carIdx}, -1)"><i class="fa fa-chevron-left"></i></button>` : ''}
                            ${fotosHtml}
                            ${c.fotos.length > 1 ? `<button class="slider-btn next" onclick="window.changeSlide(${carIdx}, 1)"><i class="fa fa-chevron-right"></i></button>` : ''}
                        </div>
                        <div class="card-content">
                            <span class="car-brand">${c.marca || 'Veículo'}</span>
                            <div class="car-title">${c.modelo}</div>
                            <div class="price">R$ ${Number(c.preco).toLocaleString('pt-BR')}</div>
                            
                            <div class="mini-specs">
                                <span>${c.ano || '---'}</span>
                                <span>${c.km ? c.km + ' km' : '---'}</span>
                            </div>

                            <a href="#" class="btn-whats" onclick="window.negociar('${c.modelo}', '${c.vendedorResponsavel}')">
                                <i class="fab fa-whatsapp"></i> NEGOCIAR
                            </a>
                        </div>
                    </div>`;
            });
        }

        window.fullView = (url) => {
            document.getElementById('full-img').src = url;
            document.getElementById('viewer-modal').style.display = 'flex';
        };

        window.changeSlide = (carIdx, dir) => {
            const slider = document.getElementById(`slider-${carIdx}`);
            const imgs = slider.querySelectorAll('img');
            let activeIdx = Array.from(imgs).findIndex(img => img.classList.contains('active'));
            imgs[activeIdx].classList.remove('active');
            activeIdx = (activeIdx + dir + imgs.length) % imgs.length;
            imgs[activeIdx].classList.add('active');
        };

        window.negociar = async (modelo, vendedor) => {
            const q = query(collection(db, "vendedores"), where("lojaId", "==", lojaId), where("nome", "==", vendedor));
            const snap = await getDocs(q);
            let tel = "";
            snap.forEach(d => tel = d.data().whatsapp);
            if(tel) {
                const num = tel.replace(/\D/g, "");
                window.open(`https://wa.me/55${num}?text=Olá! Vi o ${modelo} no portal e quero informações.`, '_blank');
            } else {
                alert("Consultor não localizado.");
            }
        };

        window.filtrar = () => {
            const termo = document.getElementById('busca').value.toLowerCase();
            const filtrados = todosCarros.filter(c => 
                c.modelo.toLowerCase().includes(termo) || 
                c.marca.toLowerCase().includes(termo)
            );
            renderizar(filtrados);
        };
    </script>
</body>
</html>
