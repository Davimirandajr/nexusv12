<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS V12 | Elite Showroom</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Outfit:wght@200;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #e31010; 
            --dark: #050505; 
            --card-bg: #0d0d0d;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--dark); color: #fff; overflow-x: hidden; }

        /* HEADER ESTILO SIO VEÍCULOS */
        header { 
            background: rgba(0,0,0,0.9); padding: 20px 5%; 
            position: fixed; top: 0; width: 100%; z-index: 2000;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }
        #logo-place h1 { font-family: 'Syncopate', sans-serif; font-size: 18px; letter-spacing: 6px; }
        .logo-img { max-height: 45px; }
        
        .header-nav { display: flex; gap: 25px; }
        .header-nav a { color: #fff; text-decoration: none; font-size: 12px; font-weight: 700; letter-spacing: 2px; transition: 0.3s; }
        .header-nav a:hover { color: var(--primary); }

        /* HERO SECTION (IMPACTO DA IMAGEM 3) */
        .hero { 
            height: 85vh; width: 100%;
            background: linear-gradient(rgba(0,0,0,0.2), var(--dark)), 
                        url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 0 20px;
        }
        .hero h2 { font-family: 'Syncopate', sans-serif; font-size: clamp(24px, 5vw, 60px); margin-bottom: 20px; letter-spacing: -2px; }
        .hero p { font-size: 18px; font-weight: 200; color: #ccc; max-width: 600px; margin-bottom: 30px; }
        .btn-scroll { 
            padding: 15px 40px; background: var(--primary); color: #fff; 
            text-decoration: none; border-radius: 50px; font-weight: 900; 
            font-size: 13px; letter-spacing: 2px; transition: 0.4s;
        }

        /* CONTAINER DE ESTOQUE */
        .container { max-width: 1400px; margin: 0 auto; padding: 60px 20px; }

        /* BUSCA (O QUE FALTAVA) */
        .search-area { margin-bottom: 50px; text-align: center; }
        .search-box { 
            display: inline-flex; align-items: center; background: #111; 
            border: 1px solid #222; padding: 5px 20px; border-radius: 50px; width: 100%; max-width: 600px;
        }
        .search-box input { 
            background: transparent; border: none; padding: 15px; color: #fff; 
            width: 100%; outline: none; font-size: 16px;
        }
        .search-box i { color: var(--primary); font-size: 20px; }

        /* GRID E CARDS (ESTILO NEXUS MELHORADO) */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        
        .card { 
            background: var(--card-bg); border-radius: 15px; overflow: hidden; 
            border: 1px solid #1a1a1a; transition: 0.5s; position: relative;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--primary); }

        .slider { position: relative; width: 100%; aspect-ratio: 16/10; overflow: hidden; }
        .slider img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .slider img.active { display: block; }
        
        .nav-btn { 
            position: absolute; top: 50%; transform: translateY(-50%); 
            background: rgba(0,0,0,0.5); color: #fff; border: none; width: 35px; height: 35px; 
            border-radius: 50%; cursor: pointer; z-index: 10; font-size: 12px; opacity: 0; transition: 0.3s;
        }
        .card:hover .nav-btn { opacity: 1; }
        .prev { left: 10px; } .next { right: 10px; }

        .card-body { padding: 25px; }
        .car-brand { font-size: 10px; color: var(--primary); font-weight: 800; letter-spacing: 3px; text-transform: uppercase; }
        .car-title { font-family: 'Syncopate', sans-serif; font-size: 16px; margin: 10px 0 20px; }
        
        .specs { display: flex; gap: 15px; margin-bottom: 20px; border-top: 1px solid #1a1a1a; padding-top: 15px; }
        .spec-item { font-size: 11px; color: #666; }
        .spec-item b { color: #fff; display: block; font-size: 13px; margin-top: 2px; }

        .price-row { display: flex; justify-content: space-between; align-items: center; }
        .price { font-size: 22px; font-weight: 300; }
        .btn-whats { 
            background: var(--primary); color: #fff; width: 45px; height: 45px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            text-decoration: none; transition: 0.3s;
        }
        .btn-whats:hover { transform: scale(1.1) rotate(15deg); }

        @media (max-width: 768px) {
            .header-nav { display: none; }
            .hero h2 { font-size: 32px; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div id="logo-place"><h1>NEXUS V12</h1></div>
        <nav class="header-nav">
            <a href="#">ESTOQUE</a>
            <a href="#">SOBRE NÓS</a>
            <a href="#">CONTATO</a>
        </nav>
    </header>

    <section class="hero">
        <h2>QUALIDADE E TRANSPARÊNCIA</h2>
        <p>Encontre o veículo dos seus sonhos com a garantia de elite .</p>
        <a href="#estoque" class="btn-scroll">VER ESTOQUE COMPLETO</a>
    </section>

    <div class="container" id="estoque">
        <div class="search-area">
            <div class="search-box">
                <i class="fa fa-search"></i>
                <input type="text" id="busca" placeholder="O QUE VOCÊ PROCURA? (EX: BMW, ONIX...)" oninput="window.filtrar()">
            </div>
        </div>

        <div id="lista-carros" class="grid"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBOCli1HzoijZ1gcplo_18tKH-5Umb63q8",
            authDomain: "nexus-v12.firebaseapp.com",
            projectId: "nexus-v12",
            storageBucket: "nexus-v12.firebasestorage.app",
            messagingSenderId: "587840382224",
            appId: "1:587840382224:web:61c0f1890c7c395dc77195"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const params = new URLSearchParams(window.location.search);
        const lojaId = params.get('loja');
        let todosCarros = [];

        if(lojaId) {
            onSnapshot(doc(db, "configuracoes", lojaId), (s) => {
                if(s.exists()){
                    const d = s.data();
                    if(d.corLoja) document.documentElement.style.setProperty('--primary', d.corLoja);
                    if(d.logo) document.getElementById('logo-place').innerHTML = `<img src="${d.logo}" class="logo-img">`;
                }
            });

            const q = query(collection(db, "carros"), where("lojaId", "==", lojaId), where("status", "==", "disponivel"));
            onSnapshot(q, (snap) => {
                todosCarros = [];
                snap.forEach(d => todosCarros.push({id: d.id, ...d.data()}));
                renderizar(todosCarros);
            });
        }

        function renderizar(lista) {
            const grid = document.getElementById('lista-carros');
            grid.innerHTML = '';
            
            lista.forEach((c, carIdx) => {
                const fotosHtml = c.fotos.map((f, i) => `<img src="${f}" class="${i===0?'active':''}">`).join('');
                
                grid.innerHTML += `
                    <div class="card">
                        <div class="slider" id="slider-${carIdx}">
                            <button class="nav-btn prev" onclick="window.changeSlide(${carIdx}, -1)"><i class="fa fa-chevron-left"></i></button>
                            <button class="nav-btn next" onclick="window.changeSlide(${carIdx}, 1)"><i class="fa fa-chevron-right"></i></button>
                            ${fotosHtml}
                        </div>
                        <div class="card-body">
                            <span class="car-brand">${c.marca || 'Premium'}</span>
                            <div class="car-title">${c.modelo}</div>
                            
                            <div class="specs">
                                <div class="spec-item">Ano <b>${c.ano}</b></div>
                                <div class="spec-item">KM <b>${Number(c.km).toLocaleString('pt-BR')}</b></div>
                            </div>

                            <div class="price-row">
                                <div class="price">R$ ${Number(c.preco).toLocaleString('pt-BR')}</div>
                                <a href="#" class="btn-whats" onclick="window.negociar('${c.modelo}', '${c.vendedorResponsavel}')">
                                    <i class="fab fa-whatsapp"></i>
                                </a>
                            </div>
                        </div>
                    </div>`;
            });
        }

        window.changeSlide = (carIdx, dir) => {
            const slider = document.getElementById(`slider-${carIdx}`);
            const imgs = slider.querySelectorAll('img');
            let activeIdx = Array.from(imgs).findIndex(img => img.classList.contains('active'));
            imgs[activeIdx].classList.remove('active');
            activeIdx = (activeIdx + dir + imgs.length) % imgs.length;
            imgs[activeIdx].classList.add('active');
        };

        window.negociar = async (modelo, vendedor) => {
            const q = query(collection(db, "vendedores"), where("lojaId", "==", lojaId), where("nome", "==", vendedor));
            const snap = await getDocs(q);
            let tel = "";
            snap.forEach(d => tel = d.data().whatsapp);
            if(tel) {
                const num = tel.replace(/\D/g, "");
                window.open(`https://wa.me/55${num}?text=Olá! Vi o ${modelo} no portal e tenho interesse.`, '_blank');
            }
        };

        window.filtrar = () => {
            const termo = document.getElementById('busca').value.toLowerCase();
            const filtrados = todosCarros.filter(c => 
                c.modelo.toLowerCase().includes(termo) || 
                c.marca.toLowerCase().includes(termo)
            );
            renderizar(filtrados);
        };
    </script>
</body>
</html>
