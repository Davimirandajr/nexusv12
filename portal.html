<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS V12 | Elite Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #e31010; 
            --dark: #050508; 
            --glass: rgba(255, 255, 255, 0.03);
            --whatsapp: #25D366;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--dark); color: #fff; line-height: 1.4; }

        /* Header Futurista */
        header { 
            background: rgba(5, 5, 8, 0.9); padding: 20px; 
            position: sticky; top: 0; z-index: 1000;
            backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .header-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: center; }
        .logo-img { max-height: 50px; filter: drop-shadow(0 0 10px var(--primary)); }
        #logo-place h1 { font-family: 'Syncopate', sans-serif; font-size: 22px; letter-spacing: 4px; color: var(--primary); }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        /* Busca High-Tech */
        .search-section { margin-bottom: 40px; }
        .search-box { position: relative; max-width: 500px; margin: 0 auto; }
        .search-box input { 
            width: 100%; padding: 15px 20px 15px 50px; border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.1); background: var(--glass); 
            color: #fff; font-size: 16px; outline: none; transition: 0.3s;
        }
        .search-box input:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(227, 16, 16, 0.2); }
        .search-box i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--primary); }

        /* Grid Otimizada (2 colunas no mobile!) */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); 
            gap: 30px; 
        }

        /* Card Masterpiece */
        .card { 
            background: #0f0f13; border-radius: 30px; overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.05); transition: 0.4s;
            position: relative;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--primary); }

        /* Media / Slider */
        .slider { position: relative; width: 100%; aspect-ratio: 16/10; background: #000; overflow: hidden; }
        .slider img { width: 100%; height: 100%; object-fit: cover; display: none; transition: 0.5s; }
        .slider img.active { display: block; }

        /* Botão Full Image */
        .btn-expand {
            position: absolute; top: 15px; right: 15px; width: 35px; height: 35px;
            background: rgba(0,0,0,0.5); border-radius: 50%; color: #fff;
            display: flex; align-items: center; justify-content: center; z-index: 20;
            backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2); cursor: pointer;
        }

        .slider-btn { 
            position: absolute; top: 50%; transform: translateY(-50%); 
            background: rgba(0,0,0,0.3); color: #fff; border: none; 
            width: 30px; height: 30px; cursor: pointer; border-radius: 50%; z-index: 10;
        }
        .prev { left: 10px; } .next { right: 10px; }

        /* Content */
        .card-content { padding: 20px; }
        .car-brand { font-size: 10px; text-transform: uppercase; letter-spacing: 3px; color: var(--primary); font-weight: 800; }
        .card-content h3 { margin: 5px 0; font-size: 20px; font-weight: 700; color: #fff; }
        .price { font-size: 24px; font-weight: 800; color: #fff; margin: 10px 0; }
        
        /* Mini Specs Matrix */
        .tags { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .tag { 
            background: rgba(255,255,255,0.03); padding: 8px; border-radius: 10px; 
            font-size: 10px; text-align: center; color: #aaa; border: 1px solid rgba(255,255,255,0.05);
        }
        .tag i { display: block; margin-bottom: 4px; color: var(--primary); }

        /* Botões */
        .actions { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .btn-whats { 
            background: var(--primary); color: #fff; text-decoration: none;
            padding: 14px; border-radius: 15px; font-weight: 800; text-align: center;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            font-size: 13px; letter-spacing: 1px; transition: 0.3s;
        }
        .btn-whats:hover { filter: brightness(1.2); box-shadow: 0 0 20px rgba(227, 16, 16, 0.4); }

        /* MODAL FULL SCREEN */
        #viewer-modal {
            display: none; position: fixed; inset: 0; background: #000; z-index: 5000;
            align-items: center; justify-content: center;
        }
        #viewer-modal img { max-width: 100%; max-height: 100vh; object-fit: contain; }

        /* --- RESPONSIVIDADE MOBILE (Coração da Mudança) --- */
        @media (max-width: 768px) {
            .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .container { padding: 12px; }
            .card { border-radius: 20px; }
            .card-content { padding: 12px; }
            .card-content h3 { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
            .price { font-size: 16px; margin: 5px 0; }
            .car-brand { font-size: 8px; letter-spacing: 1px; }
            .tags { display: none; } /* Esconde specs no mobile para focar no visual */
            .btn-whats { padding: 10px; font-size: 11px; border-radius: 10px; }
            .slider { aspect-ratio: 1/1; }
        }

        /* Modal Lead */
        #modal-lead { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
            z-index: 2000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px);
        }
        .modal-content { background: #15151a; padding: 30px; border-radius: 30px; max-width: 400px; width: 100%; text-align: center; border: 1px solid var(--primary); }
        .modal-content input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; background: #000; color: #fff; }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <div id="logo-place"><h1>NEXUS V12</h1></div>
        </div>
    </header>

    <div class="container">
        <div class="search-section">
            <div class="search-box">
                <i class="fa fa-search"></i>
                <input type="text" id="busca" placeholder="O que você busca hoje?" oninput="window.filtrar()">
            </div>
        </div>

        <div id="lista-carros" class="grid"></div>
    </div>

    <div id="viewer-modal" onclick="this.style.display='none'">
        <img src="" id="full-img">
    </div>

    <div id="modal-lead">
        <div class="modal-content">
            <h2 id="modal-carro-nome" style="font-family:'Syncopate'">Interesse</h2>
            <p style="color:#888; margin: 10px 0;">Consultoria exclusiva Siow Veículos.</p>
            <input type="text" id="lead-nome" placeholder="Seu Nome">
            <input type="tel" id="lead-whats" placeholder="Seu WhatsApp">
            <button class="btn-whats" style="width:100%; margin-top:10px" onclick="window.enviarInteresse()">SOLICITAR ATENDIMENTO</button>
            <button style="background:none; border:none; color: #555; margin-top:15px; cursor:pointer;" onclick="document.getElementById('modal-lead').style.display='none'">CANCELAR</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, where, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBOCli1HzoijZ1gcplo_18tKH-5Umb63q8",
            authDomain: "nexus-v12.firebaseapp.com",
            projectId: "nexus-v12",
            storageBucket: "nexus-v12.firebasestorage.app",
            messagingSenderId: "587840382224",
            appId: "1:587840382224:web:61c0f1890c7c395dc77195"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const lojaId = params.get('loja');
        let todosCarros = [];
        let carroSelecionadoObj = null;

        if(!lojaId) {
            document.body.innerHTML = `<div style="text-align:center; padding:100px 20px;"><h2>Portal Nexus v12 Off-line</h2></div>`;
        } else {
            onSnapshot(doc(db, "configuracoes", lojaId), (s) => {
                if(s.exists()){
                    const d = s.data();
                    if(d.corLoja) document.documentElement.style.setProperty('--primary', d.corLoja);
                    if(d.logo) document.getElementById('logo-place').innerHTML = `<img src="${d.logo}" class="logo-img">`;
                }
            });

            const q = query(collection(db, "carros"), where("lojaId", "==", lojaId), where("status", "==", "disponivel"));
            onSnapshot(q, (snap) => {
                todosCarros = [];
                snap.forEach(d => todosCarros.push({id: d.id, ...d.data()}));
                renderizar(todosCarros);
            });
        }

        function renderizar(lista) {
            const grid = document.getElementById('lista-carros');
            grid.innerHTML = '';
            
            lista.forEach((c, carIdx) => {
                const fotosHtml = c.fotos.map((f, i) => `<img src="${f}" class="${i===0?'active':''}" data-index="${i}">`).join('');
                
                grid.innerHTML += `
                    <div class="card">
                        <div class="btn-expand" onclick="window.fullView('${c.fotos[0]}')">
                            <i class="fa fa-expand"></i>
                        </div>
                        <div class="slider" id="slider-${carIdx}">
                            ${c.fotos.length > 1 ? `<button class="slider-btn prev" onclick="window.changeSlide(${carIdx}, -1)"><i class="fa fa-chevron-left"></i></button>` : ''}
                            ${fotosHtml}
                            ${c.fotos.length > 1 ? `<button class="slider-btn next" onclick="window.changeSlide(${carIdx}, 1)"><i class="fa fa-chevron-right"></i></button>` : ''}
                        </div>
                        <div class="card-content">
                            <span class="car-brand">${c.marca}</span>
                            <h3>${c.modelo}</h3>
                            <div class="price">R$ ${Number(c.preco).toLocaleString('pt-BR')}</div>
                            
                            <div class="tags">
                                <div class="tag"><i class="fa fa-calendar"></i>${c.ano}</div>
                                <div class="tag"><i class="fa fa-road"></i>${c.km}km</div>
                                <div class="tag"><i class="fa fa-cog"></i>Gota</div>
                            </div>

                            <div class="actions">
                                <button class="btn-whats" onclick="window.negociarComVendedor('${c.modelo}', '${c.vendedorResponsavel}')">
                                    <i class="fab fa-whatsapp"></i> NEGOCIAR AGORA
                                </button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        window.fullView = (url) => {
            const modal = document.getElementById('viewer-modal');
            document.getElementById('full-img').src = url;
            modal.style.display = 'flex';
        }

        window.changeSlide = (carIdx, dir) => {
            const slider = document.getElementById(`slider-${carIdx}`);
            const imgs = slider.querySelectorAll('img');
            let activeIdx = Array.from(imgs).findIndex(img => img.classList.contains('active'));
            imgs[activeIdx].classList.remove('active');
            activeIdx = (activeIdx + dir + imgs.length) % imgs.length;
            imgs[activeIdx].classList.add('active');
        };

        window.negociarComVendedor = async (modelo, nomeVendedor) => {
            const q = query(collection(db, "vendedores"), where("lojaId", "==", lojaId), where("nome", "==", nomeVendedor));
            const snap = await getDocs(q);
            let tel = "";
            snap.forEach(d => tel = d.data().whatsapp);
            const num = tel.replace(/\D/g, "");
            window.open(`https://wa.me/55${num}?text=Olá! Vi o *${modelo}* no portal Nexus e quero detalhes.`, '_blank');
        };

        window.filtrar = () => {
            const termo = document.getElementById('busca').value.toLowerCase();
            const filtrados = todosCarros.filter(c => c.modelo.toLowerCase().includes(termo) || c.marca.toLowerCase().includes(termo));
            renderizar(filtrados);
        };
    </script>
</body>
</html>
