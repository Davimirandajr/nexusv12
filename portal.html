<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS V12 | Showroom Profissional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Outfit:wght@200;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #e31010; 
            --dark: #000000; 
            --card-bg: #0d0d0d;
            --sidebar-bg: #050505;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--dark); color: #fff; overflow-x: hidden; }

        /* HEADER RESPONSIVO */
        header { 
            background: #000; padding: 15px 30px; 
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 2px solid var(--primary);
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo-img { max-height: 45px; transition: 0.3s; }
        #logo-place h1 { font-family: 'Syncopate', sans-serif; font-size: 18px; letter-spacing: 5px; }

        /* LAYOUT PRINCIPAL */
        .main-wrapper { display: flex; max-width: 1800px; margin: 0 auto; min-height: 100vh; }

        /* SIDEBAR (FILTROS) */
        .sidebar { 
            width: 320px; background: var(--sidebar-bg); padding: 30px;
            border-right: 1px solid #1a1a1a; position: sticky; top: 77px; height: calc(100vh - 77px);
            overflow-y: auto; transition: 0.3s;
        }
        .sidebar h3 { font-family: 'Syncopate', sans-serif; font-size: 11px; margin-bottom: 25px; color: var(--primary); letter-spacing: 2px; }
        
        .filter-group { margin-bottom: 20px; }
        .filter-group label { display: block; font-size: 10px; color: #666; text-transform: uppercase; margin-bottom: 8px; }
        .filter-group input, .filter-group select { 
            width: 100%; background: #111; border: 1px solid #222; padding: 12px; 
            color: #fff; outline: none; border-radius: 5px; font-size: 14px;
        }
        .filter-group input:focus { border-color: var(--primary); }

        /* ÁREA DE CARROS */
        .content { flex: 1; padding: 30px; }
        .results-info { margin-bottom: 25px; font-size: 18px; font-weight: 200; border-bottom: 1px solid #1a1a1a; padding-bottom: 15px; }
        .results-info b { color: var(--primary); }

        /* GRID ADAPTÁVEL */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
        }

        /* CARD ESTILO UNIDAS DARK */
        .card { 
            background: var(--card-bg); border-radius: 10px; overflow: hidden; 
            border: 1px solid #1a1a1a; transition: 0.4s; position: relative;
        }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); }

        .slider { position: relative; width: 100%; aspect-ratio: 16/10; overflow: hidden; background: #000; }
        .slider img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .slider img.active { display: block; animation: fadeIn 0.5s; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card-content { padding: 20px; }
        .car-brand { font-size: 10px; color: var(--primary); font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
        .car-title { font-family: 'Syncopate', sans-serif; font-size: 15px; margin: 5px 0 15px; }
        
        .car-specs { display: flex; gap: 15px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #1a1a1a; }
        .spec-item { font-size: 10px; color: #777; text-transform: uppercase; }
        .spec-item b { color: #fff; display: block; font-size: 12px; margin-top: 2px; font-weight: 400; }

        .price { font-size: 22px; font-weight: 300; margin-bottom: 15px; display: block; }

        .btn-talk { 
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 14px; background: #25D366; color: #fff; 
            text-decoration: none; border-radius: 6px; font-weight: 700; font-size: 12px;
            text-transform: uppercase; transition: 0.3s;
        }
        .btn-talk:hover { filter: brightness(1.1); }

        /* AJUSTES PARA TELAS MENORES (TABLETS E CELULARES) */
        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; }
            .sidebar { 
                width: 100%; height: auto; position: relative; top: 0; 
                border-right: none; border-bottom: 1px solid #1a1a1a; padding: 20px;
            }
            .grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            header { padding: 15px 20px; }
            #logo-place h1 { font-size: 14px; letter-spacing: 3px; }
            .content { padding: 15px; }
        }
    </style>
</head>
<body>

    <header>
        <div id="logo-place"><h1>NEXUS V12</h1></div>
        <div style="font-size: 10px; opacity: 0.5;">SHOWROOM VIRTUAL</div>
    </header>

    <div class="main-wrapper">
        <aside class="sidebar">
            <h3>Filtros</h3>
            <div class="filter-group">
                <label>O que você busca?</label>
                <input type="text" id="busca" placeholder="Modelo ou marca..." oninput="window.filtrar()">
            </div>
            <div class="filter-group">
                <label>Ordenar por</label>
                <select id="ordem" onchange="window.filtrar()">
                    <option value="recentes">Mais recentes</option>
                    <option value="menor-preco">Menor Preço</option>
                </select>
            </div>
        </aside>

        <main class="content">
            <div class="results-info">Estoque: <b id="count-total">0</b> veículos</div>
            <div id="lista-carros" class="grid"></div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBOCli1HzoijZ1gcplo_18tKH-5Umb63q8",
            authDomain: "nexus-v12.firebaseapp.com",
            projectId: "nexus-v12",
            storageBucket: "nexus-v12.firebasestorage.app",
            messagingSenderId: "587840382224",
            appId: "1:587840382224:web:61c0f1890c7c395dc77195"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const params = new URLSearchParams(window.location.search);
        const lojaId = params.get('loja');
        let todosCarros = [];

        if(lojaId) {
            onSnapshot(doc(db, "configuracoes", lojaId), (s) => {
                if(s.exists()){
                    const d = s.data();
                    if(d.corLoja) document.documentElement.style.setProperty('--primary', d.corLoja);
                    if(d.logo) document.getElementById('logo-place').innerHTML = `<img src="${d.logo}" class="logo-img">`;
                }
            });

            const q = query(collection(db, "carros"), where("lojaId", "==", lojaId), where("status", "==", "disponivel"));
            onSnapshot(q, (snap) => {
                todosCarros = [];
                snap.forEach(d => todosCarros.push({id: d.id, ...d.data()}));
                renderizar(todosCarros);
            });
        }

        function renderizar(lista) {
            const grid = document.getElementById('lista-carros');
            document.getElementById('count-total').innerText = lista.length;
            grid.innerHTML = '';
            
            lista.forEach((c, carIdx) => {
                const fotosHtml = c.fotos.map((f, i) => `<img src="${f}" class="${i===0?'active':''}">`).join('');
                grid.innerHTML += `
                    <div class="card">
                        <div class="slider" id="slider-${carIdx}">${fotosHtml}</div>
                        <div class="card-content">
                            <span class="car-brand">${c.marca || 'Premium'}</span>
                            <div class="car-title">${c.modelo}</div>
                            <div class="car-specs">
                                <div class="spec-item">Ano <b>${c.ano}</b></div>
                                <div class="spec-item">KM <b>${Number(c.km).toLocaleString('pt-BR')}</b></div>
                            </div>
                            <span class="price">R$ ${Number(c.preco).toLocaleString('pt-BR')}</span>
                            <a href="#" class="btn-talk" onclick="window.negociar('${c.modelo}', '${c.vendedorResponsavel}')">
                                <i class="fab fa-whatsapp"></i> Consultar Agora
                            </a>
                        </div>
                    </div>`;
            });
        }

        window.negociar = async (modelo, vendedor) => {
            const q = query(collection(db, "vendedores"), where("lojaId", "==", lojaId), where("nome", "==", vendedor));
            const snap = await getDocs(q);
            let tel = "";
            snap.forEach(d => tel = d.data().whatsapp);
            if(tel) {
                const num = tel.replace(/\D/g, "");
                window.open(`https://wa.me/55${num}?text=Olá! Gostaria de mais informações sobre o ${modelo}.`, '_blank');
            }
        };

        window.filtrar = () => {
            const termo = document.getElementById('busca').value.toLowerCase();
            const filtrados = todosCarros.filter(c => c.modelo.toLowerCase().includes(termo) || c.marca.toLowerCase().includes(termo));
            renderizar(filtrados);
        };
    </script>
</body>
</html>
